name: Deploy to Hostinger

on:
  push:
    branches:
      - main # Change this to your default branch name (e.g. master or main)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      # Step 3: Install dependencies and build the project
      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # Step 3.5: Compress all files into a single archive
      - name: Compress Release Archive
        run: |
          tar -czf /tmp/release.tar.gz --exclude='.git' --exclude='.github' --exclude='node_modules/.cache' .
          mv /tmp/release.tar.gz ./release.tar.gz

      # Step 4: Deploy the single archive to Hostinger via SFTP
      - name: Upload Release Archive
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          port: 65002
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './release.tar.gz'
          remote_path: '/home/u661112337/public_html/'

      # Step 5: Log in via SSH, extract the archive, clean up, and restart Passenger
      - name: SSH Extract and Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          script: |
            cd /home/u661112337/public_html
            tar -xzf release.tar.gz
            rm -f release.tar.gz
            mkdir -p tmp
            touch tmp/restart.txt
