name: Deploy to Hostinger

on:
  push:
    branches:
      - main # Change this to your default branch name (e.g. master or main)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      # Step 3: Install dependencies and build the project
      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          # If you have build-time environment variables, add them here:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # Step 4: Deploy built files to Hostinger via SFTP
      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          port: 65002
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './'
          remote_path: '/public_html/'
          rsyncArgs: '--exclude=node_modules --exclude=.git --exclude=.github --exclude=tsconfig.json --exclude=tailwind.config.ts --exclude=postcss.config.mjs --exclude=process_logo.js --exclude=process_logo.py --exclude=README.md --exclude=.env.local'

      # Step 5: Touch Passenger restart file to force Hostinger to reload the app
      - name: Restart Node.js Server
        run: |
          echo "Restarting Hostinger passenger app..."
          # Passenger automatically restarts Node apps when tmp/restart.txt is touched
          mkdir -p tmp
          touch tmp/restart.txt
